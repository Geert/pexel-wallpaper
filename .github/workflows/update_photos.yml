name: Update Pexels Photos

on:
  schedule:
    # Runs daily at 02:00 UTC. You can change the schedule.
    # See https://crontab.guru/ for cron schedule expressions.
    - cron: '0 2 * * *'
  workflow_dispatch: # Allows manual triggering

concurrency:
  group: update-photos
  cancel-in-progress: false

jobs:
  update-photos:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit and push changes
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Pexels photo URLs
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
        run: node fetch_pexels_urls.mjs

      - name: Commit and push if changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/pexels_photo_data.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Automated update of Pexels photo URLs"
            git push
            echo "Changes committed and pushed."
          fi
